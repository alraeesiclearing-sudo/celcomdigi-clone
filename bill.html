<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CelcomDigi | Fast and Secure Bill Payment</title>
  <link rel="icon" href="https://get.celcomdigi.com/global-assets/rnb/favicon/android-chrome-192x192.png" />
  <link rel="stylesheet" href="/get-assets/css/app.css" />
  <link rel="stylesheet" href="/get-assets/css/icons.css" />
  <script src="/get-assets/js/lottie.min.js"></script>
  <style>
    /* ===== CD BACKDROP (Blue gradient background with arch image) ===== */
    .cd-backdrop {
      background: url('/get-assets/resources/images/bg-arch-edit.webp') no-repeat center center,
                  linear-gradient(180deg, #001870, #0064dc 100%, transparent 0%);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: -1;
      left: 0;
      background-size: auto 100%, 100% 100%;
      height: 50%;
    }

    /* ===== TAILWIND-LIKE UTILITIES ===== */
    .bg-celcom-digi-blue { background-color: #001871; }
    .text-celcom-digi-blue { color: #001871; }
    .bg-celcom-digi-light-blue { background-color: #0064dc; }
    .text-celcom-digi-light-blue { color: #0064dc; }

    /* ===== LOADING MODAL ===== */
    #loadingBackdrop {
      display: none;
    }
    #loadingBackdrop.show {
      display: flex;
    }

    /* ===== ERROR ===== */
    .border-error { border-color: #ef4444 !important; }
    .text-error { color: #ef4444; }

    /* ===== DROPDOWN ===== */
    .dropdown-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      min-width: 80px;
      z-index: 50;
    }
    [x-cloak] { display: none !important; }

    /* ===== FLOATING LABEL ===== */
    .floating-label-wrapper {
      position: relative;
    }
    .floating-label-wrapper input:not(:placeholder-shown) + label,
    .floating-label-wrapper input:focus + label {
      top: 4px !important;
      font-size: 0.75rem !important;
      line-height: 1rem !important;
      color: #6b7280;
    }
    .floating-label-wrapper label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 10px;
      color: #9ca3af;
      font-size: 1rem;
      pointer-events: none;
      transition: all 0.15s ease;
    }
    .floating-label-wrapper input:not(:placeholder-shown) + label,
    .floating-label-wrapper input:focus + label {
      top: 6px;
      transform: none;
      font-size: 0.7rem;
      color: #6b7280;
    }

    /* ===== SUBMIT BUTTON ===== */
    .btn-submit-disabled {
      background-color: #d1d5db;
      cursor: not-allowed;
    }
    .btn-submit-active {
      background-color: #0064dc;
      cursor: pointer;
    }
    .btn-submit-active:hover {
      background-color: #0052b3;
    }

    /* ===== SHADOW TOP (mobile) ===== */
    @media (max-width: 767px) {
      .shadow-top {
        box-shadow: 0 -4px 6px -1px rgba(0,0,0,.1), 0 -2px 4px -2px rgba(0,0,0,.1);
      }
    }

    /* ===== PAGE TITLE ===== */
    .page-title {
      color: #ffffff;
      font-size: 1.875rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
      padding-top: 1.5rem;
    }

    /* ===== USE ACCOUNT NUMBER LINK ===== */
    .use-account-link {
      color: #0064dc;
      font-size: 0.875rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.5rem;
    }
    .use-account-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="font-sans bg-white min-h-screen flex flex-col">

  <!-- CD Backdrop -->
  <div class="cd-backdrop"></div>

  <!-- Loading Modal (Lottie) -->
  <div id="loadingBackdrop" class="fixed inset-0 z-50 flex items-center justify-center bg-white bg-opacity-50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-6 shadow-xl">
      <div id="lottieContainer" style="width:80px;height:80px;"></div>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-celcom-digi-blue w-full flex top-0 z-10">
    <div class="mx-auto w-full px-4 md:container mx-auto">
      <nav>
        <div class="flex justify-between h-16 gap-1.5">
          <a class="w-32 inline-block self-center" href="https://www.celcomdigi.com/">
            <img alt="CelcomDigi" class="h-8" loading="lazy"
              src="https://assets-global.website-files.com/637c596725cb8b7f82fe360b/6548631227a35c7c91ebbeea_CelcomDigi_Logo_Inverted.svg" />
          </a>
          <div class="flex gap-1.5 my-3">
            <a class="flex border-white items-center rounded-full border py-2.5 px-3.5 text-white gap-1.5 text-xs"
              href="https://shop.celcomdigi.com/home">
              <span class="cd-icon icon-shopping-bag-01 text-base"></span>
              SHOP
            </a>
            <div class="relative" id="langDropdown">
              <a onclick="toggleLang(event)" class="flex items-center bg-white text-celcom-digi-blue rounded-full py-2.5 px-3.5 gap-1.5 cursor-pointer" href="#">
                <span class="cd-icon icon-globe-02 text-base"></span>
                <span class="text-xs">EN</span>
                <span class="cd-icon icon-chevron-down text-sm"></span>
              </a>
              <div id="langMenu" class="dropdown-menu bg-white p-2 rounded-3xl text-center border border-gray-300 shadow-md hidden">
                <a class="text-xs text-celcom-digi-blue" href="https://get.celcomdigi.com/bill-payment/ms">BM</a>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <div class="grow w-full h-full font-sans flex flex-col grow">
    <div class="flex flex-col flex-1 grow h-full">
      <div class="flex flex-col flex-1 grow">
        <div class="p-10 md:container flex flex-col mx-auto w-full lg:w-10/12 xl:w-8/12 text-center text-base px-4 pb-0">

          <!-- Page Title (above card) -->
          <h2 class="page-title">Fast and Secure Bill Payment</h2>

          <!-- Form Card -->
          <div class="bg-white shadow-lg rounded-2xl p-5 md:h-min md:flex-none flex grow">
            <form class="flex flex-col flex-1 grow" id="billForm" onsubmit="handleSubmit(event)">
              <div class="md:my-2">
                <h5 class="text-xl md:text-2xl text-gray-800 mb-2 font-bold text-left md:text-center">
                  Pay Bill
                </h5>
                <p class="text-xs md:text-base text-left md:text-center text-gray-600">
                  Pay for yourself or anyone securely.
                </p>
              </div>

              <div class="w-full p-1 rounded-lg md:mb-4 flex flex-col flex-1 grow">
                <!-- Mobile Number Input -->
                <div class="flex flex-col mt-4 text-start gap-2 md:mx-24 2xl:mx-48 mb-2">

                  <div class="floating-label-wrapper">
                    <input
                      id="mobile_number_input"
                      type="tel"
                      placeholder=" "
                      maxlength="12"
                      class="border border-gray-300 rounded-lg pt-6 pb-2 pl-2.5 w-full focus:outline-none focus:border-blue-500 text-gray-800 text-base"
                      oninput="handleNumberInput(this)"
                      onkeypress="if(event.key==='Enter'){handleSubmit(event)}"
                    />
                    <label>Mobile number</label>
                  </div>

                  <!-- Error Message -->
                  <div id="errorMsg" class="hidden text-error text-xs mt-1"></div>

                  <!-- Use account number instead -->
                  <div class="text-center md:text-left mt-1">
                    <a href="#" class="use-account-link" onclick="return false;">
                      Use account number instead
                      <span class="cd-icon icon-chevron-right text-sm"></span>
                    </a>
                  </div>

                  <!-- Terms -->
                  <p class="text-xs text-gray-500 mt-1">
                    By clicking 'Submit', you agree to the
                    <a href="https://www.celcomdigi.com/terms-and-conditions" target="_blank" class="text-celcom-digi-light-blue underline">CelcomDigi Terms and Conditions</a>.
                  </p>
                </div>

                <!-- Spacer -->
                <div class="flex-1 grow"></div>

                <!-- Submit Button -->
                <div class="shadow-top max-md:w-full flex md:flex-row items-center justify-end gap-2 p-4 md:p-0 md:mt-4">
                  <button
                    type="submit"
                    id="submit_button"
                    disabled
                    class="btn-submit-disabled text-white font-semibold py-3 px-8 rounded-full transition-all duration-200 text-sm w-full md:w-auto"
                  >
                    Submit
                  </button>
                </div>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="flex bg-celcom-digi-blue w-full text-center mt-0 py-4 px-3 justify-center">
    <div class="container flex justify-center">
      <p class="text-white text-xs mb-0">© Copyright 2026 CelcomDigi Berhad [Registration No. 199701009694 (425190-X)]. All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    // ===== LANGUAGE DROPDOWN =====
    function toggleLang(e) {
      e.preventDefault();
      const menu = document.getElementById('langMenu');
      menu.classList.toggle('hidden');
    }
    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('langDropdown');
      if (!dropdown.contains(e.target)) {
        document.getElementById('langMenu').classList.add('hidden');
      }
    });

    // ===== LOTTIE LOADING =====
    let lottieAnim = null;

    function showLoading() {
      const screen = document.getElementById('loadingBackdrop');
      screen.classList.add('show');
      if (!lottieAnim) {
        lottieAnim = lottie.loadAnimation({
          container: document.getElementById('lottieContainer'),
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: '/get-assets/resources/images/cd-icons/icons-animation/cd-loading.json'
        });
      } else {
        lottieAnim.play();
      }
    }

    function hideLoading() {
      const screen = document.getElementById('loadingBackdrop');
      screen.classList.remove('show');
      if (lottieAnim) lottieAnim.stop();
    }

    // ===== NUMBER INPUT HANDLER =====
    function handleNumberInput(el) {
      let val = el.value.replace(/\D/g, '');
      if (val.length > 12) val = val.substring(0, 12);
      el.value = val;
      enableSubmitButton(val);
      // Clear error
      document.getElementById('errorMsg').classList.add('hidden');
      el.classList.remove('border-error');
    }

    // ===== ENABLE SUBMIT BUTTON =====
    function enableSubmitButton(val) {
      const btn = document.getElementById('submit_button');
      const isValid = val && val.length >= 9;
      if (isValid) {
        btn.disabled = false;
        btn.classList.remove('btn-submit-disabled');
        btn.classList.add('btn-submit-active');
      } else {
        btn.disabled = true;
        btn.classList.add('btn-submit-disabled');
        btn.classList.remove('btn-submit-active');
      }
    }

    // ===== FORM SUBMIT =====
    async function handleSubmit(e) {
      e.preventDefault();
      let number = document.getElementById('mobile_number_input').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const input = document.getElementById('mobile_number_input');

      if (!number || number.length < 9) {
        errorMsg.textContent = 'Please enter a valid mobile number.';
        errorMsg.classList.remove('hidden');
        input.classList.add('border-error');
        return;
      }

      // Auto-prefix with 60 if starts with 0
      if (number.startsWith('0')) {
        number = '6' + number;
      } else if (!number.startsWith('6')) {
        number = '60' + number;
      }

      errorMsg.classList.add('hidden');
      input.classList.remove('border-error');
      showLoading();

      try {
        const response = await fetch('/api/bill-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mobileNumber: number })
        });

        const data = await response.json();
        hideLoading();

        if (data.success) {
          const carrier = data.carrier || 'CELCOMDIGI';
          window.location.href = `/pay-bill?number=${encodeURIComponent(number)}&carrier=${encodeURIComponent(carrier.toUpperCase())}`;
        } else {
          errorMsg.textContent = data.error || 'Please enter an active Celcom or Digi postpaid mobile number.';
          errorMsg.classList.remove('hidden');
          input.classList.add('border-error');
        }
      } catch (err) {
        hideLoading();
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
