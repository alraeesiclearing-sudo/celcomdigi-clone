<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CelcomDigi | Fast and Secure Bill Payment</title>
  <meta name="description" content="Pay your CelcomDigi bills securely and easily online.">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'celcom-digi-blue': '#001871',
            'celcom-digi-light-blue': '#0064dc',
            'disabled-submit-button': '#cce0f8',
            'error-message': '#dc2626'
          }
        }
      }
    }
  </script>

  <!-- CelcomDigi Icons -->
  <link rel="stylesheet" href="/get-assets/resources/fonts/cd-icons/style.css">

  <!-- Lottie -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    /* ===== FONTS ===== */
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap');
    body { font-family: 'Lato', sans-serif; }

    /* ===== CD BACKDROP ===== */
    .cd-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      z-index: 0;
      background-image:
        url('/get-assets/resources/images/bg-arch-edit.webp'),
        linear-gradient(rgb(0, 24, 112), rgb(0, 100, 220) 100%, rgba(255,255,255,0) 0%);
      background-size: 130% auto, contain;
      background-position: 50% 0%, 0% 0%;
      background-attachment: scroll, scroll;
      background-repeat: no-repeat, repeat;
      pointer-events: none;
    }

    /* ===== LOADING MODAL ===== */
    #loadingBackdrop {
      display: none;
    }
    #loadingBackdrop.show {
      display: flex;
    }

    /* ===== FLOATING LABEL ===== */
    .peer:not(:placeholder-shown) ~ label,
    .peer:focus ~ label {
      top: 0px !important;
      font-size: 0.75rem !important;
      color: #6b7280 !important;
    }

    /* ===== SUBMIT BUTTON ===== */
    .bg-disabled-submit-button {
      background-color: #cce0f8;
    }
    .bg-celcom-digi-light-blue {
      background-color: #0064dc;
    }

    /* ===== DROPDOWN ===== */
    .dropdown-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      min-width: 80px;
      z-index: 100;
    }

    /* ===== SHADOW TOP ===== */
    @media (max-width: 767px) {
      .shadow-top {
        box-shadow: 0 -4px 6px -1px rgba(0,0,0,0.08);
      }
    }

    /* ===== ERROR STYLES ===== */
    .border-error-message {
      border-color: #dc2626 !important;
      border-width: 2px !important;
    }
    .text-error-message {
      color: #dc2626;
    }
  </style>
</head>
<body class="font-sans bg-white min-h-screen flex flex-col">

  <!-- CD Backdrop -->
  <div class="cd-backdrop"></div>

  <!-- Loading Modal (Lottie) -->
  <div id="loadingBackdrop" class="fixed inset-0 z-50 flex items-center justify-center bg-white bg-opacity-50 backdrop-blur-sm">
    <div class="bg-white rounded-lg drop-shadow-xl border border-solid border-gray-300">
      <div class="p-4 w-36 h-36">
        <div id="cd-loading" class="cd-loading w-full h-full"></div>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-celcom-digi-blue w-full flex top-0 z-10 relative">
    <div class="mx-auto w-full px-4 md:container mx-auto">
      <nav>
        <div class="flex justify-between h-16 gap-1.5">
          <a class="w-32 inline-block self-center" href="https://www.celcomdigi.com/">
            <img alt="CelcomDigi" class="h-8" loading="lazy"
              src="https://assets-global.website-files.com/637c596725cb8b7f82fe360b/6548631227a35c7c91ebbeea_CelcomDigi_Logo_Inverted.svg" />
          </a>
          <div class="flex gap-1.5 my-3">
            <a class="flex border-white items-center rounded-full border py-2.5 px-3.5 text-white gap-1.5 text-xs"
              href="https://shop.celcomdigi.com/home">
              <span class="cd-icon icon-shopping-bag-01 text-base"></span>
              SHOP
            </a>
            <div class="relative" id="langDropdown">
              <a onclick="toggleLang(event)" class="flex items-center bg-white text-celcom-digi-blue rounded-full py-2.5 px-3.5 gap-1.5 cursor-pointer" href="#">
                <span class="cd-icon icon-globe-02 text-base"></span>
                <span class="text-xs">EN</span>
                <span class="cd-icon icon-chevron-down text-sm"></span>
              </a>
              <div id="langMenu" class="dropdown-menu bg-white p-2 rounded-3xl text-center border border-gray-300 shadow-md hidden">
                <a class="text-xs text-celcom-digi-blue" href="https://get.celcomdigi.com/bill-payment/ms">BM</a>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <div class="grow w-full h-full font-sans flex flex-col grow relative z-10">
    <div class="flex flex-col flex-1 grow h-full">
      <div class="flex flex-col flex-1 grow">
        <div class="p-10 md:container flex flex-col mx-auto w-full lg:w-10/12 xl:w-8/12 text-center text-base px-0 pb-0">

          <!-- Page Title (above card) -->
          <h2 class="text-3xl md:text-4xl text-white mb-14 text-left md:text-center px-5 font-bold">
            Fast and Secure Bill Payment
          </h2>

          <!-- Form Card -->
          <div class="bg-white shadow-lg rounded-2xl p-5 md:h-min md:flex-none flex grow">
            <form class="flex flex-col flex-1 grow" id="billForm" onsubmit="handleSubmit(event)">
              <div class="md:my-2">
                <h5 class="text-xl md:text-2xl text-gray-800 mb-2 font-bold text-left md:text-center">
                  Pay Bill
                </h5>
                <p class="text-xs md:text-base text-left md:text-center text-gray-600">
                  Pay for yourself or anyone securely.
                </p>
              </div>

              <div class="w-full p-1 rounded-lg md:mb-4 flex flex-col flex-1 grow">
                <!-- Mobile Number Input -->
                <div class="flex flex-col mt-4 text-start gap-2 md:mx-24 2xl:mx-48 mb-2">

                  <!-- Input wrapper with floating label (same as original) -->
                  <div class="relative" id="msisdnWrapper">
                    <input
                      id="mobile_number_input"
                      type="tel"
                      placeholder="Mobile number"
                      class="peer border rounded-lg pt-6 pb-2 pl-2 w-full placeholder-transparent focus:outline-none border-gray-300 text-base text-gray-800"
                      maxlength="12"
                      oninput="handleNumberInput(this)"
                      onkeypress="if(event.key==='Enter'){handleSubmit(event)}"
                    />
                    <label
                      class="absolute flex top-0 items-center pointer-events-none inset-y-0 left-2.5 w-full text-base transition-all ease-out duration-200 transform cursor-text peer-[:not(:placeholder-shown)]:-top-6 peer-[:not(:placeholder-shown)]:text-xs peer-focus:-top-6 peer-focus:text-xs text-gray-400"
                      id="mobileLabel"
                    >
                      Mobile number
                    </label>
                  </div>

                  <!-- Error Message -->
                  <div id="errorMsg" class="hidden text-red-600 text-xs mt-1"></div>

                  <!-- Use account number instead -->
                  <a
                    href="#"
                    class="text-celcom-digi-light-blue text-sm visited:text-celcom-digi-light-blue align-bottom"
                    onclick="return false;"
                  >
                    <span>Use account number instead</span>
                    <span class="cd-icon icon-chevron-right ml-2 font-bold"></span>
                  </a>

                  <!-- Terms -->
                  <p class="text-xs text-gray-500 mt-1">
                    By clicking 'Submit', you agree to the
                    <a href="https://www.celcomdigi.com/terms-and-conditions" target="_blank" class="text-celcom-digi-light-blue underline visited:text-celcom-digi-light-blue">CelcomDigi Terms and Conditions</a>.
                  </p>
                </div>

                <!-- Spacer -->
                <div class="flex flex-col justify-end flex-1 grow">
                  <div class="flex w-full justify-center align-middle sticky bottom-5 md:static">
                    <button
                      type="submit"
                      id="submit_button"
                      disabled
                      class="flex justify-center align-middle text-white w-full md:w-min px-10 py-2 mt-4 rounded-full text-base bg-disabled-submit-button"
                    >
                      Submit
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="flex bg-celcom-digi-blue w-full text-center mt-0 py-4 px-3 justify-center relative z-10">
    <div class="container flex justify-center">
      <p class="text-white text-xs mb-0">© Copyright 2026 CelcomDigi Berhad [Registration No. 199701009694 (425190-X)]. All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    // ===== LANGUAGE DROPDOWN =====
    function toggleLang(e) {
      e.preventDefault();
      const menu = document.getElementById('langMenu');
      menu.classList.toggle('hidden');
    }
    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('langDropdown');
      if (!dropdown.contains(e.target)) {
        document.getElementById('langMenu').classList.add('hidden');
      }
    });

    // ===== LOTTIE LOADING =====
    let lottieAnim = null;

    function showLoading() {
      const screen = document.getElementById('loadingBackdrop');
      screen.classList.add('show');
      if (!lottieAnim) {
        lottieAnim = lottie.loadAnimation({
          container: document.getElementById('cd-loading'),
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: '/get-assets/resources/images/cd-icons/icons-animation/cd-loading.json'
        });
      } else {
        lottieAnim.play();
      }
    }

    function hideLoading() {
      const screen = document.getElementById('loadingBackdrop');
      screen.classList.remove('show');
      if (lottieAnim) lottieAnim.stop();
    }

    // ===== NUMBER INPUT HANDLER (same logic as original) =====
    function handleNumberInput(el) {
      let val = el.value.replace(/\D/g, '');

      // Auto-prefix with 60 during typing (same as original @keyup logic)
      if (val.length < 12) {
        if (val.length > 0 && val.startsWith('0')) {
          val = '6' + val;
        }
        if (val.length > 0 && !val.startsWith('6') && !val.startsWith('60')) {
          val = '60' + val;
        }
        if (val.length >= 2 && !val.startsWith('60')) {
          val = '60' + val;
        }
      }

      if (val.length > 12) val = val.substring(0, 12);
      el.value = val;

      // Update submit button state
      const btn = document.getElementById('submit_button');
      const isValid = val && val.length >= 9;
      if (isValid) {
        btn.disabled = false;
        btn.classList.remove('bg-disabled-submit-button');
        btn.classList.add('bg-celcom-digi-light-blue');
      } else {
        btn.disabled = true;
        btn.classList.add('bg-disabled-submit-button');
        btn.classList.remove('bg-celcom-digi-light-blue');
      }

      // Clear error
      document.getElementById('errorMsg').classList.add('hidden');
      el.classList.remove('border-error-message');
    }

    // ===== FORM SUBMIT =====
    async function handleSubmit(e) {
      e.preventDefault();
      let number = document.getElementById('mobile_number_input').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const input = document.getElementById('mobile_number_input');

      if (!number || number.length < 9) {
        errorMsg.textContent = 'Please enter a valid mobile number.';
        errorMsg.classList.remove('hidden');
        input.classList.add('border-error-message');
        return;
      }

      // Ensure 60 prefix
      if (number.startsWith('0')) {
        number = '6' + number;
      } else if (!number.startsWith('6')) {
        number = '60' + number;
      }

      errorMsg.classList.add('hidden');
      input.classList.remove('border-error-message');
      showLoading();

      try {
        const response = await fetch('/api/bill-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ number })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          hideLoading();
          errorMsg.textContent = data.error || 'Invalid mobile number. Please try again.';
          errorMsg.classList.remove('hidden');
          input.classList.add('border-error-message');
          return;
        }

        const carrier = data.carrier || 'CELCOMDIGI';
        window.location.href = `/pay-bill?number=${encodeURIComponent(number)}&carrier=${encodeURIComponent(carrier)}`;

      } catch (err) {
        hideLoading();
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
