services:
  - type: web
    name: celcomdigi-clone
    env: node
    buildCommand: npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright-browsers npx playwright install chromium --with-deps
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: PLAYWRIGHT_CHROMIUM_USE_HEADLESS_SHELL
        value: "0"
